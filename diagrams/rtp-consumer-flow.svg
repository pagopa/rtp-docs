idth:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="89" x2="269" y1="825.25" y2="825.25"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22" x="101" y="820.1841">ack</text><path d="M275,838.25 L275,863.25 L599,863.25 L599,848.25 L589,838.25 L275,838.25 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M589,838.25 L589,848.25 L599,848.25 L589,838.25 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303" x="281" y="855.3169">The message has been successfully processed.</text><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="20" x2="714.5" y1="869.3828" y2="869.3828"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="223" x="25" y="879.5933">[POST FAILED (4xx / 5xx / timeout)]</text><polygon fill="#181818" points="281,900.3203,271,904.3203,281,908.3203,277,904.3203" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="275" x2="504" y1="904.3203" y2="904.3203"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156" x="287" y="899.2544">error response / timeout</text><path d="M275,917.3203 L275,972.3203 L588,972.3203 L588,927.3203 L578,917.3203 L275,917.3203 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M578,917.3203 L578,927.3203 L588,927.3203 L578,917.3203 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163" x="281" y="934.3872">Even if the POST call fails,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292" x="281" y="949.52">the message is sent to the Dead letter queue</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190" x="281" y="964.6528">for reprocessing and analysis.</text><polygon fill="#181818" points="619.5,1009.9844,629.5,1013.9844,619.5,1017.9844,623.5,1013.9844" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="270" x2="625.5" y1="1013.9844" y2="1013.9844"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216" x="277" y="993.7856">Publish(originalMessage + failure)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313" x="277" y="1008.9185">metadata: httpStatus, errorMessage, timestamp</text><polygon fill="#181818" points="281,1039.1172,271,1043.1172,281,1047.1172,277,1043.1172" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="275" x2="630.5" y1="1043.1172" y2="1043.1172"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22" x="287" y="1038.0513">ack</text><polygon fill="#181818" points="95,1068.25,85,1072.25,95,1076.25,91,1072.25" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="89" x2="269" y1="1072.25" y2="1072.25"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22" x="101" y="1067.1841">ack</text><!--SRC=[jLJ1Rjf04BtxAqQSG84aZTfBL4LoWHRKfA61zeHKBVOOhxBUTNR79FJhExismK1ox0M9tPctRzvxOvAa41uMCnWQxQe2BGpW3fqJQuHCcMVeVfkDO73ZQtfH918o5Zh-RBn1JPDgrG7XO3o9Ic599h8Kcg1ZgHma3M8e61xU5r8DH4LvkBkBJviTwhHfdKTF5LO8dH6A51GICSjm5Av7jp-ZI1j2C1k-64_wmoY6efb1EYYhbP8knnICXZRpywXD4omcA3VeG1BZRdMIMwDDvTJsF68suD-8el74gp64wnhceMvAkys3lQNkvimJhOCpACLM6P7s6e9MhdC2ax4QSy8IFhJ4tWWbKq7Iw6W0ywqcbbechMFekYJ7GlIPw5CbBS-JILIfwxNO3NVacZvyvSNUAOBVyUrq52-czp_WQpoz7OyYW6Dg08iSsm8MGcN65bv02r87w7CkczAXl6I0kFF49k1k9brQap2er6lVlESC45YpZynxLgDr3HEIMgYTF