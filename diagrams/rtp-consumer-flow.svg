<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1040px" preserveAspectRatio="none" style="width:768px;height:1040px;background:#FFFFFF;" version="1.1" viewBox="0 0 768 1040" width="768px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="349" x="210.75" y="27.9951">RTP Consumer - Message flow (GPD -&gt; RTP)</text><rect fill="none" height="677.3281" style="stroke:#000000;stroke-width:1.5;" width="551.5" x="210" y="338.8203"/><rect fill="none" height="279.2656" style="stroke:#000000;stroke-width:1.5;" width="531.5" x="220" y="729.8828"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="85" x2="85" y1="134.8906" y2="1033.1484"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="284" x2="284" y1="134.8906" y2="1033.1484"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="443.5" x2="443.5" y1="134.8906" y2="1033.1484"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="531.5" x2="531.5" y1="134.8906" y2="1033.1484"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="663.5" x2="663.5" y1="134.8906" y2="1033.1484"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71" x="46.5" y="115.292">Event Hub</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96" x="34" y="131.5889">(GPD domain)</text><ellipse cx="85" cy="50.7969" fill="#E2E2F0" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M85,58.7969 L85,85.7969 M72,66.7969 L98,66.7969 M85,85.7969 L72,100.7969 M85,85.7969 L98,100.7969 " fill="none" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#E2E2F0" height="30.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="108" x="230" y="103.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94" x="237" y="123.5889">rtp-consumer</text><rect fill="#E2E2F0" height="30.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="69" x="409.5" y="103.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55" x="416.5" y="123.5889">mil-auth</text><rect fill="#E2E2F0" height="30.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="87" x="488.5" y="103.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="73" x="495.5" y="123.5889">rtp-sender</text><path d="M590.5,92.2969 L736.5,92.2969 C741.5,92.2969 741.5,113.5938 741.5,113.5938 C741.5,113.5938 741.5,134.8906 736.5,134.8906 L590.5,134.8906 C585.5,134.8906 585.5,113.5938 585.5,113.5938 C585.5,113.5938 585.5,92.2969 590.5,92.2969 " fill="#E2E2F0" style="stroke:#181818;stroke-width:0.5;"/><path d="M736.5,92.2969 C731.5,92.2969 731.5,113.5938 731.5,113.5938 C731.5,134.8906 736.5,134.8906 736.5,134.8906 " fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="29" x="644" y="110.292">DLQ</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136" x="590.5" y="126.5889">(Dead letter queue)</text><path d="M5,149.8906 L5,189.8906 L365,189.8906 L365,159.8906 L355,149.8906 L5,149.8906 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M355,149.8906 L355,159.8906 L365,159.8906 L355,149.8906 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="339" x="11" y="166.9575">A message is published on Event Hub (GPD domain).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263" x="11" y="182.0903">rtp-consumer receives it asynchronously.</text><polygon fill="#181818" points="272,227.4219,282,231.4219,272,235.4219,276,231.4219" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="85" x2="278" y1="231.4219" y2="231.4219"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="92" y="218.7896">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="162" x="105" y="211.2231">EventReceived(message)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131" x="105" y="226.356">(headers + payload)</text><path d="M289,244.4219 L289,284.4219 L606,284.4219 L606,254.4219 L596,244.4219 L289,244.4219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M596,244.4219 L596,254.4219 L606,254.4219 L596,244.4219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177" x="295" y="261.4888">Step 1 - Message validation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296" x="295" y="276.6216">- Syntactic validation (schema, required fields)</text><line style="stroke:#181818;stroke-width:1.0;" x1="284" x2="326" y1="310.8203" y2="310.8203"/><line style="stroke:#181818;stroke-width:1.0;" x1="326" x2="326" y1="310.8203" y2="323.8203"/><line style="stroke:#181818;stroke-width:1.0;" x1="285" x2="326" y1="323.8203" y2="323.8203"/><polygon fill="#181818" points="295,319.8203,285,323.8203,295,327.8203,291,323.8203" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="291" y="305.7544">2</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119" x="304" y="305.7544">validate(message)</text><path d="M210,338.8203 L274,338.8203 L274,345.9531 L264,355.9531 L210,355.9531 L210,338.8203 " fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="677.3281" style="stroke:#000000;stroke-width:1.5;" width="551.5" x="210" y="338.8203"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="19" x="225" y="351.8872">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="133" x="289" y="351.0308">[VALIDATION FAILED]</text><path d="M289,360.9531 L289,400.9531 L581,400.9531 L581,370.9531 L571,360.9531 L289,360.9531 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M571,360.9531 L571,370.9531 L581,370.9531 L571,360.9531 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239" x="295" y="378.02">The message is malformed or invalid.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271" x="295" y="393.1528">It is published to the DLQ for reprocessing.</text><polygon fill="#181818" points="651.5,438.4844,661.5,442.4844,651.5,446.4844,655.5,442.4844" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="284" x2="657.5" y1="442.4844" y2="442.4844"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="291" y="429.8521">3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216" x="304" y="422.2856">Publish(originalMessage + failure)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313" x="304" y="437.4185">metadata: httpStatus, errorMessage, timestamp</text><polygon fill="#181818" points="295,467.6172,285,471.6172,295,475.6172,291,471.6172" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="289" x2="662.5" y1="471.6172" y2="471.6172"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="301" y="466.5513">4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22" x="314" y="466.5513">ack</text><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="210" x2="761.5" y1="480.6172" y2="480.6172"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="166" x="215" y="490.8276">[VALIDATION SUCCEEDED]</text><path d="M289,499.4219 L289,569.4219 L601,569.4219 L601,509.4219 L591,499.4219 L289,499.4219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M591,499.4219 L591,509.4219 L601,509.4219 L591,499.4219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273" x="295" y="516.4888">Step 2 - Authentication towards rtp-sender</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="295" y="531.6216">The call to rtp-sender is authenticated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="295" y="546.7544">A token is first retrieved from mil-auth,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291" x="295" y="561.8872">then the authenticated POST call is executed.</text><polygon fill="#181818" points="432,607.2188,442,611.2188,432,615.2188,436,611.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="284" x2="438" y1="611.2188" y2="611.2188"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="291" y="598.5864">5</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78" x="304" y="591.02">POST /token</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123" x="304" y="606.1528">(scope: rtp-sender)</text><polygon fill="#181818" points="295,651.4844,285,655.4844,295,659.4844,291,655.4844" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="289" x2="443" y1="655.4844" y2="655.4844"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="301" y="642.8521">6</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46" x="314" y="635.2856">200 OK</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87" x="314" y="650.4185">access_token</text><polygon fill="#181818" points="520,710.8828,530,714.8828,520,718.8828,524,714.8828" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="284" x2="526" y1="714.8828" y2="714.8828"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="291" y="694.6841">7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129" x="304" y="679.5513">POST /gpd/message</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198" x="304" y="694.6841">Authorization: Bearer &lt;token&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160" x="304" y="709.8169">body: validated message</text><path d="M220,729.8828 L284,729.8828 L284,737.0156 L274,747.0156 L220,747.0156 L220,729.8828 " fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="279.2656" style="stroke:#000000;stroke-width:1.5;" width="531.5" x="220" y="729.8828"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="19" x="235" y="742.9497">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="125" x="299" y="742.0933">[POST SUCCEEDED]</text><polygon fill="#181818" points="295,779.2813,285,783.2813,295,787.2813,291,783.2813" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="289" x2="531" y1="783.2813" y2="783.2813"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="301" y="770.6489">8</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46" x="314" y="763.0825">200 OK</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="125" x="314" y="778.2153">response: RTP body</text><path d="M289,796.2813 L289,821.2813 L613,821.2813 L613,806.2813 L603,796.2813 L289,796.2813 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M603,796.2813 L603,806.2813 L613,806.2813 L603,796.2813 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303" x="295" y="813.3481">The message has been successfully processed.</text><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="220" x2="751.5" y1="827.4141" y2="827.4141"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="223" x="225" y="837.6245">[POST FAILED (4xx / 5xx / timeout)]</text><polygon fill="#181818" points="295,858.3516,285,862.3516,295,866.3516,291,862.3516" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="289" x2="531" y1="862.3516" y2="862.3516"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="301" y="857.2856">9</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156" x="314" y="857.2856">error response / timeout</text><path d="M289,875.3516 L289,930.3516 L513,930.3516 L513,885.3516 L503,875.3516 L289,875.3516 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M503,875.3516 L503,885.3516 L513,885.3516 L503,875.3516 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163" x="295" y="892.4185">Even if the POST call fails,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203" x="295" y="907.5513">the message is sent to the DLQ</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190" x="295" y="922.6841">for reprocessing and analysis.</text><polygon fill="#181818" points="651.5,968.0156,661.5,972.0156,651.5,976.0156,655.5,972.0156" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="284" x2="657.5" y1="972.0156" y2="972.0156"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="18" x="291" y="959.3833">10</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216" x="313" y="951.8169">Publish(originalMessage + failure)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313" x="313" y="966.9497">metadata: httpStatus, errorMessage, timestamp</text><polygon fill="#181818" points="295,997.1484,285,1001.1484,295,1005.1484,291,10