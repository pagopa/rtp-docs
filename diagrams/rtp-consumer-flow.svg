s-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="166" x="15" y="503.6636">[VALIDATION SUCCEEDED]</text><path d="M275,512.2578 L275,582.2578 L587,582.2578 L587,522.2578 L577,512.2578 L275,512.2578 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M577,512.2578 L577,522.2578 L587,522.2578 L577,512.2578 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273" x="281" y="529.3247">Step 2 - Authentication towards rtp-sender</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="281" y="544.4575">The call to rtp-sender is authenticated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="281" y="559.5903">A token is first retrieved from mil-auth,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291" x="281" y="574.7231">then the authenticated POST call is executed.</text><polygon fill="#181818" points="405,620.0547,415,624.0547,405,628.0547,409,624.0547" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="270" x2="411" y1="624.0547" y2="624.0547"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78" x="277" y="603.856">POST /token</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123" x="277" y="618.9888">(scope: rtp-sender)</text><polygon fill="#181818" points="281,664.3203,271,668.3203,281,672.3203,277,668.3203" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="275" x2="416" y1="668.3203" y2="668.3203"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46" x="287" y="648.1216">200 OK</text><text fill="#000000" 